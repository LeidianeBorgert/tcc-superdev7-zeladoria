<div class="dashboard-container">
  <h2 class="page-title">Painel de Monitoramento Urbano</h2>
  <p class="page-subtitle">Visão geral dos relatos e manutenções em Blumenau</p>

  <div class="dashboard-cards">
    <div class="card card-novos">
      <div class="card-value">{{ totalNovos }}</div>
      <div class="card-label">NOVOS RELATOS</div>
    </div>

    <div class="card card-andamento">
      <div class="card-value">{{ emAndamento }}</div>
      <div class="card-label">EM ANDAMENTO</div>
    </div>

    <div class="card card-resolvidos">
      <div class="card-value">{{ resolvidos }}</div>
      <div class="card-label">RESOLVIDOS</div>
    </div>
  </div>
</div>
